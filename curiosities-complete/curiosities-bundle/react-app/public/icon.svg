<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep dark canvas, slightly warmer at top-left -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1c1409"/>
      <stop offset="100%" stop-color="#090704"/>
    </linearGradient>

    <!-- Old gold gradient for the "io" letterform -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5c3e10"/>
      <stop offset="22%"  stop-color="#a87428"/>
      <stop offset="48%"  stop-color="#c09035"/>
      <stop offset="72%"  stop-color="#7a5520"/>
      <stop offset="100%" stop-color="#9e7428"/>
    </linearGradient>

    <!-- Warm gold rim -->
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#c8922a" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#8a6020" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3a2008" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Teal candlelight glow filter — three-layer bloom behind the "io" -->
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"  result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="42" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
      </feMerge>
    </filter>

    <!-- Subtle inner vignette — makes centre glow pop more -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="512" height="512" rx="112" fill="#0a0805"/>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Vignette so the teal glow reads against a darker edge -->
  <rect width="512" height="512" rx="112" fill="url(#vignette)"/>

  <!-- Teal glow layer: "io" in teal, blurred — the glow IS the letterform shape -->
  <text
    x="256" y="318"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="268" font-weight="800"
    text-anchor="middle"
    fill="#18d4b0"
    filter="url(#glow)"
  >io</text>

  <!-- Gold letterform layer on top -->
  <text
    x="256" y="318"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="268" font-weight="800"
    text-anchor="middle"
    fill="url(#gold)"
  >io</text>

  <!-- Warm gold border rim -->
  <rect x="3" y="3" width="506" height="506" rx="110"
        fill="none" stroke="url(#rim)" stroke-width="2.5"/>
</svg>
