<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport: viewport-fit=cover handles iPhone notch & Dynamic Island ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA & Home Screen ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#c8922a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="curIosities" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- ── Prevent iOS formatting phone numbers / addresses ── -->
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />

    <!-- ── SEO ── -->
    <title>curIosities — Preserve History, Earn Forever</title>
    <meta name="description" content="Scan rare documents, war letters, maps and photographs. One tap inscribes them on the BSV blockchain — earn royalties every time researchers, historians or AI companies access them." />
    <meta name="author" content="curIosities" />

    <!-- ── Open Graph ── -->
    <meta property="og:title" content="curIosities — The Digital Cabinet of Curiosities" />
    <meta property="og:description" content="Turn historical documents into permanent blockchain assets. AI analyses rarity, one-tap inscription, earn forever." />
    <meta property="og:type" content="website" />

    <!-- ── Twitter / X ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@curIosities" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
