<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0a0805"/>
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)"/>
  <!-- Subtle inner glow rim -->
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="url(#rim)" stroke-width="2" opacity="0.4"/>
  <!-- Letterform: T -->
  <rect x="120" y="148" width="272" height="44" rx="8" fill="url(#gold)"/>
  <rect x="214" y="192" width="84" height="172" rx="8" fill="url(#gold)"/>
  <!-- Underline accent -->
  <rect x="156" y="376" width="200" height="6" rx="3" fill="url(#gold-dim)" opacity="0.6"/>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#c87c1a"/>
    </linearGradient>
    <linearGradient id="gold-dim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#d4a020"/>
      <stop offset="70%" stop-color="#d4a020"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#80500a"/>
    </linearGradient>
  </defs>
</svg>
